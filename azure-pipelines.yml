# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

- script: |
    cd monitor-service
    chmod +x mvnw
    ./mvnw clean package
  displayName: 'Build monitor service'

- script: |
    cd metrics-service/metrics-service
    chmod +x mvnw
    ./mvnw clean package -DskipTests
  displayName: 'Build metrics service'

